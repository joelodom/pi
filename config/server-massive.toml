# =============================================================================
# pi performance config: massive server (~128+ cores, 512 GB - 2 TB RAM)
# =============================================================================
#
# Target: dual-socket EPYC/Xeon, 128+ physical cores, large memory
# pool.  Tuning shifts noticeably here:
#   * Lots of cores means lots of tiny tasks — drop the parallelism
#     thresholds well below the laptop values.
#   * NTT's bursty parallelism saturates badly past ~32 cores
#     (forward/inverse passes don't scale linearly), while Karatsuba's
#     3-way split is embarrassingly parallel right down to the
#     threshold.  Stay on Karatsuba for slightly larger inputs.
#   * Larger L3 (often 256 MB+) can hold bigger butterfly tasks
#     resident, but we still drop the task size because we have
#     enough cores to want fine-grained scheduling more than we want
#     huge per-task work.
#
# Pi sizes this hardware tier targets: 1B in ~10-15 minutes, 10B in
# ~2-3 hours.  Memory headroom comfortably to ~30B-100B digits
# before disk-backed buffers become necessary (planned, not yet
# implemented).
# =============================================================================

[runtime]
# 0 = autodetect.  On a 128-core box you get 128 threads (or 256 with
# SMT enabled, but pi is largely memory-bandwidth-bound and rarely
# benefits from SMT — pin to the physical core count if you can
# measure a regression).  Set explicitly if running alongside other
# workloads.
threads = 0


[bignum]
karatsuba_threshold = 32

# AGGRESSIVELY LOWERED from 512 to 128.  With 128+ cores, you want
# every Karatsuba multiplication of moderate size to fan out 3-way.
# At 128 limbs (~8 KB per sub-mult), the rayon::join overhead is
# still well-amortised and you get many more parallel tasks.
parallel_karatsuba_threshold = 128

# RAISED from 8192 to 16384.  NTT's internal parallelism is bursty
# (forward/inverse passes followed by sequential twiddle-table builds
# and bit-reversals), and at 128+ cores those sequential pockets
# dominate.  Karatsuba's clean 3-way split scales further; let it run
# longer before dispatching to NTT.  Re-tune downward if a future
# parallel-bit-reversal / six-step NTT lands.
ntt_threshold = 16384

newton_div_threshold = 64


[bignum.ntt]
# AGGRESSIVELY LOWERED from 65536 to 16384.  Many cores, want lots of
# small tasks to keep them all busy.  Still 128 KB per task — L2-
# resident on every modern server CPU.
target_task_size = 16384

# LOWERED.  More cores benefit from parallel pack / pointwise even on
# moderate-sized inputs.
parallel_pack_threshold = 512
parallel_pointwise_threshold = 512


[chudnovsky]
# AGGRESSIVELY LOWERED from 64 to 16.  Want fine-grained leaves to
# saturate 128 cores.  At 16 terms per leaf, each leaf is still doing
# real work (~16 small integer multiplies + adds).
parallel_split_threshold = 16


[decimal_conversion]
to_string_dc_threshold = 32
parallel_to_string_threshold = 64


[perf]
# RAISED to 2000 ms.  A 1B-digit run takes ~10-15 minutes here;
# default 500 ms produces excessive log volume.  Drop to 250-500 ms
# for tuning experiments.
default_sample_ms = 2000
