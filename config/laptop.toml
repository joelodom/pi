# =============================================================================
# pi performance config: laptop / consumer hardware
# =============================================================================
#
# Target: 8-16 logical cores, 16-32 GB RAM, NVMe storage.  This file
# mirrors the compiled-in defaults exactly — running pi without any
# `--config` flag produces the same behaviour as `--config config/laptop.toml`.
# Use this file as the starting point when tuning for a new machine:
# copy it, change the values you want to override, and pass it via
# `pi --config <path>`.
#
# All thresholds are in *limbs* (1 limb = 64 bits = ~19 decimal digits)
# unless otherwise noted.  "Lower" / "higher" comments refer to the
# direction of the change relative to this file's value.
#
# Sections you may want to uncomment / change on different hardware:
#   * [runtime]       — thread pool size (most-cores machines)
#   * [bignum]        — multiplication crossover thresholds
#   * [bignum.ntt]    — NTT-specific knobs (task size, parallel cuts)
#   * [chudnovsky]    — series-evaluation parallelism granularity
#   * [decimal_conversion] — base-10 conversion crossover and parallelism
#   * [perf]          — sampling cadence
# =============================================================================

[runtime]
# Number of rayon worker threads.  0 = autodetect (one per logical core).
# Set explicitly when you want to leave headroom for other processes, or
# to constrain the run to a NUMA node.
threads = 0


[bignum]
# Limb count below which schoolbook (O(N^2)) multiplication beats
# Karatsuba.  ~32 limbs ≈ 2 KB ≈ 600 decimal digits.  Below this, the
# constant overhead of Karatsuba's three sub-mults outweighs the saved
# work.  Don't change unless you have a hot benchmark showing a shift.
karatsuba_threshold = 32

# Limb count above which Karatsuba's three sub-multiplications run on
# separate rayon worker threads.  At this scale (~32 KB ≈ 10K digits per
# operand), the cost of three sub-mults dominates rayon's task overhead,
# so spawning is a clear win.  LOWER this on machines with many cores
# that finish each task quickly and would otherwise sit idle.  RAISE
# this on machines with few cores or where memory bandwidth (rather
# than CPU) is the bottleneck — Karatsuba sub-mults compete for the
# same cache.
parallel_karatsuba_threshold = 512

# Limb count above which `mul_mag` dispatches to the Goldilocks NTT.
# NTT is asymptotically faster (N log N vs N^1.585) but has large
# constant overhead (forward + inverse transforms, twiddle setup).
# 8192 limbs ≈ 500 KB ≈ 150K digits per operand — the cross-over on
# this laptop.  LOWER if NTT is fast on your hardware (e.g. server
# with massive memory bandwidth).  RAISE if NTT's bursty parallelism
# leaves cores idle and you'd rather stay on Karatsuba longer.
ntt_threshold = 8192

# Limb count above which integer division uses Newton-Raphson
# reciprocal instead of Knuth's Algorithm D.  Knuth is O(N^2);
# Newton-Raphson is O(M(N)).  Crossover is purely algorithmic and
# unlikely to need tuning per machine.
newton_div_threshold = 64


[bignum.ntt]
# Target per-task work in butterfly passes, measured in u64 elements.
# Sized so that two halves of a butterfly group (lo + hi) fit
# comfortably in L2 cache.  64K * 8 bytes = 512 KB per task —
# matches typical x86-64 L2 size.
#
# LOWER (e.g. 16384 or 8192) on machines with many cores that need
# finer-grained parallelism to keep all cores busy.  RAISE (e.g.
# 131072) on machines with larger caches where bigger tasks stay
# resident.  Must be a power of two.
target_task_size = 65536

# Limb count above which packing limbs into NTT coefficients runs in
# parallel.  Packing is fully data-parallel but very cheap per limb,
# so the cross-over is high — only worth parallelising when there are
# many limbs.
parallel_pack_threshold = 1024

# NTT element count above which the pointwise multiply in
# `mul_mag_ntt` runs in parallel.
parallel_pointwise_threshold = 1024


[chudnovsky]
# Range size (in Chudnovsky series terms, NOT limbs) below which the
# binary-splitting recursion stays sequential; above it the two halves
# fork via rayon::join.  64 terms ≈ 6 levels of doubling above the
# leaves.  LOWER on many-core machines where the wider tree near the
# root would otherwise serialise; RAISE on few-core machines where the
# rayon::join overhead exceeds the saved work.
parallel_split_threshold = 64

# MEMORY-CONSERVATIVE knob — only meaningful at very large digit
# counts (~100M+ on a 16-32 GB box).  Subtrees with size at or above
# this threshold serialise their two halves instead of running them
# in parallel, so only ONE huge NTT call is live at a time at the top
# of the tree.  Each big NTT still uses all rayon workers internally
# for its butterflies — we just don't run two of them concurrently.
# Trades a small amount of wall time for several GB of peak RSS at
# 1B+ scale.  Set to `0` for full parallelism (best speed, highest
# memory).  Suggested value on 16-32 GB laptops: 5_000_000.
sequential_top_threshold = 1000000

# MEMORY-CONSERVATIVE knob — at billion-digit scale, the parallel
# numerator/reciprocal chains in final assembly keep ~2× as many
# multi-GB Float intermediates live as the sequential version.
# Sequential is ~10% slower at our scale, but saves a few GB peak.
# Set to `true` for the speed-optimised default.
parallel_final_assembly = false


[decimal_conversion]
# Limb count below which the divide-and-conquer base-10 conversion
# falls back to the naive divide-by-10^19 leaf.  32 limbs ≈ 600
# digits — small enough that the naive loop is faster than another
# D&C split.
to_string_dc_threshold = 32

# Limb count above which the D&C base-conversion's hi/lo recursion
# forks onto separate rayon workers.  LOWER on many-core machines.
parallel_to_string_threshold = 256


[perf]
# Default sampling interval for `--performance-file` (milliseconds).
# The CLI flag `--performance-sample-ms` overrides this.  500 ms gives
# ~20 samples per phase on a 10-second 10M run.  RAISE to 2000-5000
# for 1B+ runs where 500 ms generates excessive output; LOWER to 100
# for short tuning runs where you want fine-grained traces.
default_sample_ms = 500
